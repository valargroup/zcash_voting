syntax = "proto3";
package zvote.module.v1;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "github.com/z-cale/zally/x/vote/module/v1";

// Module is the config object for the x/vote module.
message Module {
  option (cosmos.app.v1alpha1.module) = {
    go_import: "github.com/z-cale/zally/x/vote"
  };

  // authority defines the custom module authority. If not set, defaults to the governance module.
  string authority = 1;
}
