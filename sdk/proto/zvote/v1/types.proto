syntax = "proto3";
package zvote.v1;

option go_package = "github.com/z-cale/zally/x/vote/types";

// SessionStatus represents the lifecycle state of a voting session.
enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_ACTIVE      = 1;
  SESSION_STATUS_TALLYING    = 2;
  SESSION_STATUS_FINALIZED   = 3;
}

// Proposal represents a single ballot option within a voting session.
message Proposal {
  uint32 id          = 1;
  string title       = 2;
  string description = 3;
}

// VoteRound represents a voting session created by MsgCreateVotingSession.
message VoteRound {
  bytes         vote_round_id       = 1;
  uint64        snapshot_height     = 2;
  bytes         snapshot_blockhash  = 3;
  bytes         proposals_hash      = 4;
  uint64        vote_end_time       = 5;
  bytes         nullifier_imt_root  = 6;
  bytes         nc_root             = 7;
  string        creator             = 8;
  SessionStatus status              = 9;
  bytes  ea_pk                      = 10; // Election authority public key (Pallas, 32 bytes)
  bytes  vk_zkp1                    = 11; // Verification key for ZKP #1
  bytes  vk_zkp2                    = 12; // Verification key for ZKP #2
  bytes  vk_zkp3                    = 13; // Verification key for ZKP #3
  repeated Proposal proposals       = 14;
}

// CommitmentTreeState holds the current state of the append-only commitment tree.
message CommitmentTreeState {
  uint64 next_index = 1; // Next leaf index to write
  bytes  root       = 2; // Current Merkle root (empty until EndBlocker computes it)
  uint64 height     = 3; // Block height at which this root was last computed
}

// GenesisState defines the vote module's genesis state.
message GenesisState {
  repeated VoteRound          rounds          = 1;
  CommitmentTreeState         tree_state      = 2;
  repeated CommitmentLeaf     commitment_leaves = 3;
  repeated NullifierEntry     nullifiers      = 4;
}

// CommitmentLeaf is an entry in the append-only commitment tree.
message CommitmentLeaf {
  uint64 index = 1;
  bytes  value = 2;
}

// NullifierEntry is a recorded nullifier, scoped by type and round.
message NullifierEntry {
  bytes  nullifier      = 1;
  uint32 nullifier_type = 2; // 0=gov, 1=vote-authority-note, 2=share (maps to NullifierType)
  bytes  round_id       = 3; // voting round this nullifier belongs to
}
