# Manually trigger a nullifier resync on the deploy host.
# Runs the full ingest → export → restart pipeline so the PIR server
# picks up the new data.
# Requires repository secrets: DEPLOY_HOST, DEPLOY_USER, SSH_PASSWORD.

name: Resync nullifier snapshot

on:
  workflow_dispatch:
    inputs:
      max_height:
        description: "Stop syncing at this block height. Non-multiples of 10 are rounded down. If not provided, defaults to the latest chain tip rounded down to the nearest multiple of 10."
        required: false
        type: string

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/nullifier-ingest

jobs:
  resync:
    name: Ingest, export, restart
    runs-on: ubuntu-latest
    steps:
      - name: Round max_height down to nearest multiple of 10
        id: round_height
        run: |
          MAX_HEIGHT="${{ github.event.inputs.max_height }}"
          if [ -z "$MAX_HEIGHT" ]; then
            MAX_HEIGHT=$(curl -sf "https://api.blockchair.com/zcash/stats" | jq -r '.data.best_block_height')
          fi
          ROUNDED=$(( (MAX_HEIGHT / 10) * 10 ))
          echo "value=$ROUNDED" >> "$GITHUB_OUTPUT"

      - name: Ingest, export, and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 60m
          script: |
            cd /opt/nullifier-ingest && \
              ./nf-server ingest \
                --data-dir /opt/nullifier-ingest \
                --lwd-url https://zec.rocks:443 \
                --invalidate \
                --max-height ${{ steps.round_height.outputs.value }} && \
              ./nf-server export \
                --data-dir /opt/nullifier-ingest \
                --output-dir /opt/nullifier-ingest/pir-data && \
              sudo systemctl restart nullifier-query-server
