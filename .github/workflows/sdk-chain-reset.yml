# Reset the deployed 3-validator chain: stop, reinitialize, start, register.
# When reset_chain is false, just restarts services without wiping state.
#
# Can be called standalone (workflow_dispatch) or from sdk-chain-deploy.yml
# after new binaries have been deployed.

name: Reset SDK chain

on:
  workflow_dispatch:
    inputs:
      reset_chain:
        description: "Wipe and reinitialize all validator data before starting"
        type: boolean
        default: true
  workflow_call:
    inputs:
      reset_chain:
        type: boolean
        default: false

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/zally-chain

jobs:
  reset:
    name: Reset chain
    runs-on: ubuntu-latest
    steps:
      - name: Stop services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            for svc in zallyd-val1 zallyd-val2 zallyd-val3; do
              sudo systemctl stop "$svc" || true
            done
            sudo pkill -9 -x zallyd || true
            for i in $(seq 1 20); do
              if ! ss -tlnp | grep -qE ':26156|:26256|:26356|:6160|:6260|:6360'; then
                echo "Ports freed"
                break
              fi
              if [ "$i" = "20" ]; then
                echo "WARN: ports still bound after 20s, forcing..."
                sudo fuser -k 26156/tcp 26256/tcp 26356/tcp 6160/tcp 6260/tcp 6360/tcp || true
                sleep 1
              fi
              sleep 1
            done

      - name: Reinitialize all validators
        if: ${{ inputs.reset_chain == true }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            export HOME=${{ env.DEPLOY_PATH }} PATH=${{ env.DEPLOY_PATH }}:$PATH
            chmod +x ${{ env.DEPLOY_PATH }}/zallyd ${{ env.DEPLOY_PATH }}/create-val-tx
            bash ${{ env.DEPLOY_PATH }}/init_multi.sh --ci

      - name: Start services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            for svc in zallyd-val1 zallyd-val2 zallyd-val3; do
              sudo systemctl start "$svc"
            done

      - name: Register post-genesis validators
        if: ${{ inputs.reset_chain == true }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            export HOME=${{ env.DEPLOY_PATH }} PATH=${{ env.DEPLOY_PATH }}:$PATH
            for i in $(seq 1 30); do
              if curl -sf http://localhost:1418/zally/v1/commitment-tree/latest > /dev/null 2>&1; then
                echo "Val1 API ready"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "FAIL: val1 API not responding after 60s"
                sudo journalctl -u zallyd-val1 --no-pager -n 50
                exit 1
              fi
              sleep 2
            done
            # Register val1 pallas key (gentx doesn't include it)
            ${{ env.DEPLOY_PATH }}/zallyd tx vote register-pallas-key \
              --from validator --keyring-backend test \
              --home "$HOME/.zallyd-val1" \
              --chain-id zvote-1 --node tcp://localhost:26157 --yes
            sleep 2
            # Register val2
            ${{ env.DEPLOY_PATH }}/create-val-tx \
              --home "$HOME/.zallyd-val2" \
              --moniker val2 \
              --amount 10000000uzvote \
              --rpc-url tcp://localhost:26157
            sleep 2
            # Register val3
            ${{ env.DEPLOY_PATH }}/create-val-tx \
              --home "$HOME/.zallyd-val3" \
              --moniker val3 \
              --amount 10000000uzvote \
              --rpc-url tcp://localhost:26157

      - name: Verify services healthy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            sleep 5
            for svc in zallyd-val1 zallyd-val2 zallyd-val3; do
              if ! sudo systemctl is-active --quiet "$svc"; then
                echo "FAIL: $svc not active"
                sudo systemctl status "$svc" --no-pager
                sudo journalctl -u "$svc" --no-pager -n 100
                exit 1
              fi
            done

            for i in $(seq 1 30); do
              if curl -sf http://localhost:1418/zally/v1/commitment-tree/latest > /dev/null 2>&1; then
                echo "Chain API healthy (val1 port 1418)"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "FAIL: Chain API not responding after 60s"
                sudo journalctl -u zallyd-val1 --no-pager -n 50
                exit 1
              fi
              sleep 2
            done

            for i in $(seq 1 15); do
              if curl -sf http://localhost:1418/api/v1/status > /dev/null 2>&1; then
                echo "Helper server healthy"
                break
              fi
              if [ "$i" = "15" ]; then
                echo "FAIL: Helper server /api/v1/status not responding after 30s"
                sudo journalctl -u zallyd-val1 --no-pager -n 50
                exit 1
              fi
              sleep 2
            done

            echo "Chain + helper server both healthy"
