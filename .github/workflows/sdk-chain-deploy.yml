# Deploy a 3-validator zallyd chain to a single remote host on every push to
# main, then restart services. Optionally reset chain state.
#
# Port layout (all validators on one host):
#   Val1: P2P 26156  RPC 26157  API 1418  pprof 6160
#   Val2: P2P 26256  RPC 26257  API 1518  pprof 6260
#   Val3: P2P 26356  RPC 26357  API 1618  pprof 6360
#
# Requires repository secrets: DEPLOY_HOST, DEPLOY_USER, SSH_PASSWORD,
# CEREMONY_SSH_KEY (ed25519 private key for key-based SSH).
# See sdk/docs/deploy-setup.md for one-time remote setup.

name: Deploy SDK chain

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
  workflow_dispatch:
    inputs:
      reset_chain:
        description: "Reset chain state (wipes existing data and reinitializes all 3 validators)"
        type: boolean
        default: false

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/zally-chain

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            sdk/circuits/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-sdk-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sdk-circuits-

      - name: Build SDK binaries
        run: mise run build && mise run build:create-val-tx

      - name: Copy init script to build root
        run: cp sdk/scripts/init_multi.sh sdk/init_multi.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-chain-binaries
          path: |
            sdk/zallyd
            sdk/create-val-tx
            sdk/init_multi.sh

  deploy:
    name: Deploy binaries
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-chain-binaries

      - name: Make binaries executable
        run: chmod +x zallyd create-val-tx

      - name: Create deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: mkdir -p ${{ env.DEPLOY_PATH }}

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "zallyd,create-val-tx,init_multi.sh"
          target: ${{ env.DEPLOY_PATH }}

  restart:
    name: Restart chain
    needs: deploy
    uses: ./.github/workflows/sdk-chain-reset.yml
    with:
      reset_chain: ${{ inputs.reset_chain == true }}
    secrets: inherit
