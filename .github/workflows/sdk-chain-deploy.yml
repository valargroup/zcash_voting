# Deploy zallyd chain to a remote host on every push to main,
# then bootstrap the EA key ceremony so the chain is ready for use.
#
# Requires repository secrets: DEPLOY_HOST, DEPLOY_USER, SSH_PASSWORD,
# CEREMONY_SSH_KEY (ed25519 private key for key-based SSH).
# See sdk/docs/deploy-setup.md for one-time remote setup.

name: Deploy SDK chain

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
  workflow_dispatch: # allow manual run

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/zally-chain

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            sdk/circuits/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-sdk-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sdk-circuits-

      - name: Build Rust circuits library
        run: make circuits

      - name: Build zallyd with FFI
        run: make build-ffi

      - name: Copy init script to build root
        run: cp scripts/init.sh init.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-chain-binaries
          path: |
            sdk/zallyd
            sdk/init.sh

  deploy:
    name: Deploy to remote
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-chain-binaries

      - name: Make binary executable
        run: chmod +x zallyd

      - name: Create deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: mkdir -p ${{ env.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "zallyd,init.sh"
          target: ${{ env.DEPLOY_PATH }}

      - name: Stop service before reinit
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            sudo systemctl stop zallyd || true
            # Kill any orphaned zallyd processes not managed by systemd
            sudo pkill -9 -x zallyd || true
            # Wait for ports 26657 and 6060 to be freed
            for i in $(seq 1 15); do
              if ! ss -tlnp | grep -qE ':26657|:6060'; then
                echo "Ports freed"
                break
              fi
              if [ "$i" = "15" ]; then
                echo "WARN: ports still bound after 15s, forcing..."
                sudo fuser -k 26657/tcp 6060/tcp || true
                sleep 1
              fi
              sleep 1
            done

      - name: Initialize chain
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            export HOME=${{ env.DEPLOY_PATH }} PATH=${{ env.DEPLOY_PATH }}:$PATH
            chmod +x ${{ env.DEPLOY_PATH }}/zallyd
            bash ${{ env.DEPLOY_PATH }}/init.sh

      - name: Start service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            sudo systemctl start zallyd

      - name: Verify systemd service active
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            sleep 5
            if ! sudo systemctl is-active --quiet zallyd; then
              echo "FAIL: zallyd service not active"
              sudo systemctl status zallyd --no-pager
              sudo journalctl -u zallyd --no-pager -n 100
              exit 1
            fi

      - name: Verify services healthy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Wait up to 60s for zallyd to start serving
            for i in $(seq 1 30); do
              if curl -sf http://localhost:1318/zally/v1/commitment-tree/latest > /dev/null 2>&1; then
                echo "Chain API healthy (port 1318)"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "FAIL: Chain API not responding after 60s"
                sudo journalctl -u zallyd --no-pager -n 50
                exit 1
              fi
              sleep 2
            done

            # Verify helper server endpoint responds
            for i in $(seq 1 15); do
              if curl -sf http://localhost:1318/api/v1/status > /dev/null 2>&1; then
                echo "Helper server healthy"
                break
              fi
              if [ "$i" = "15" ]; then
                echo "FAIL: Helper server /api/v1/status not responding after 30s"
                sudo journalctl -u zallyd --no-pager -n 50
                exit 1
              fi
              sleep 2
            done

            echo "Deploy verified: chain + helper server both healthy"

  ceremony:
    name: Bootstrap ceremony
    runs-on: ubuntu-latest
    needs: deploy
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache e2e-tests build
        uses: actions/cache@v4
        with:
          path: |
            e2e-tests/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-e2e-tests-${{ hashFiles('e2e-tests/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2e-tests-

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CEREMONY_SSH_KEY }}" > ~/.ssh/ceremony_key
          chmod 600 ~/.ssh/ceremony_key
          cat >> ~/.ssh/config <<EOF
          Host ceremony-remote
            HostName ${{ secrets.DEPLOY_HOST }}
            User ${{ secrets.DEPLOY_USER }}
            IdentityFile ~/.ssh/ceremony_key
            StrictHostKeyChecking no
          EOF

      - name: Run ceremony bootstrap
        run: ./scripts/remote-ceremony.sh ceremony-remote
