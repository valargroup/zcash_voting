[workspace]
members = [
    "librustvoting",
    "vote-commitment-tree",
    "vote-commitment-tree-client",
]
resolver = "2"

# All crate patches live here (workspace-level).
# Individual member Cargo.tomls use crates-io version strings;
# Cargo resolves them from these overrides.
#
# orchard: use the copy bundled in voting-circuits repo (upstream 0.11 +
#   pub visibility for constants/spec + shared_primitives gadget).
#   This ensures type compatibility with voting-circuits.
#
# librustzcash crates: pczt + zcash_keys + zcash_primitives + zcash_protocol +
#   zcash_client_sqlite need our governance visibility changes (pub getters on
#   PCZT types, etc.) and wallet helpers (create_orchard_tree_tables, snapshot
#   note queries).
[patch.crates-io]
orchard = { git = "https://github.com/valargroup/voting-circuits.git" }

zcash_client_sqlite = { git = "https://github.com/valargroup/librustzcash.git", branch = "shielded-voting-wallet-support" }
pczt                = { git = "https://github.com/valargroup/librustzcash.git", branch = "shielded-voting-wallet-support" }
zcash_keys          = { git = "https://github.com/valargroup/librustzcash.git", branch = "shielded-voting-wallet-support" }
zcash_primitives    = { git = "https://github.com/valargroup/librustzcash.git", branch = "shielded-voting-wallet-support" }
zcash_protocol      = { git = "https://github.com/valargroup/librustzcash.git", branch = "shielded-voting-wallet-support" }
