[workspace]
members = [
    "librustvoting",
    "vote-commitment-tree",
    "vote-commitment-tree-client",
]
resolver = "2"

# All crate patches live here (workspace-level).
# Individual member Cargo.tomls use crates-io version strings;
# Cargo resolves them from these overrides.
#
# Monorepo-local overrides: all subtree repos are available as siblings,
# so we patch git deps to local paths to avoid network fetches in CI.
[patch.crates-io]
orchard        = { path = "../voting-circuits/orchard" }
pczt           = { path = "../librustzcash/pczt" }
zcash_keys     = { path = "../librustzcash/zcash_keys" }
zcash_protocol = { path = "../librustzcash/components/zcash_protocol" }

[patch."https://github.com/valargroup/vote-nullifier-pir.git"]
imt-tree   = { path = "../vote-nullifier-pir/imt-tree" }
pir-client = { path = "../vote-nullifier-pir/pir/client" }

[patch."https://github.com/valargroup/voting-circuits.git"]
voting-circuits = { path = "../voting-circuits/voting-circuits" }
